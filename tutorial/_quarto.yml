project:
  type: book
  output-dir: _book
  pre-render:
    - Rscript _pre-render.R

book:
  title: "sconjoint: Structural Deep Learning for Conjoint Experiments"
  chapters:
    - index.qmd
    - 01-installation.qmd
    - 02-sanity-check.qmd
    - 03-example-sw.qmd
    - 04-example-gs.qmd
    - 05-example-br.qmd
    - 06-example-bs.qmd
    - 07-plot-options.qmd
    - references.qmd
    - changelog.qmd

bibliography: references.bib

nocite: |
  @*

suppress-bibliography: true

format:
  html:
    theme: cosmo
    toc: true

execute:
  freeze: false
  cache: true
  eval: true
  echo: true
  warning: false
  message: false
