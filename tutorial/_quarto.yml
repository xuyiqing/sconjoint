project:
  type: book
  output-dir: _book
  pre-render:
    - Rscript _pre-render.R

book:
  title: "sconjoint: Structural Deep Learning for Conjoint Experiments"
  author: "Avidit Acharya, Jens Hainmueller, Yiqing Xu"
  chapters:
    - index.qmd
    - 01-installation.qmd
    - 02-example-sw.qmd
    - 03-example-gs.qmd
    - 04-example-bs.qmd
    - 05-simulation.qmd
    - 06-plot-options.qmd
    - 07-faq.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true

execute:
  freeze: auto
  cache: true
  eval: true
  echo: true
  warning: false
  message: false
